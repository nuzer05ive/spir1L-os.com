version: "3.9"
services:
  api:
    image: node:18
    volumes:
      - ../src:/app
    depends_on:
      - redis
  redis:
    image: redis:7
  gpu-runner:
    image: node:18
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    command: pnpm run replay:run
    depends_on:
      - redis
