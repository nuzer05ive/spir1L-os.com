<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reel Forge VR</title>
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <audio id="theme" src="/spiral_os_theme.mp3"></audio>
      <a-asset-item id="model-n1k" src="/models/n1k_oz.glb"></a-asset-item>
      <a-asset-item id="model-dragon" src="/models/dragon_o3.glb"></a-asset-item>
      <a-asset-item id="model-prof" src="/models/prof_monday.glb"></a-asset-item>
      <a-asset-item id="model-dewey" src="/models/deweyD.glb"></a-asset-item>
      <a-asset-item id="model-bloom" src="/models/bloom.glb"></a-asset-item>
      <a-asset-item id="model-tunnel" src="/models/tunnel.glb"></a-asset-item>
    </a-assets>

    <a-entity id="cameraRig" position="0 1.6 0">
      <a-camera wasd-controls-enabled="false"></a-camera>
    </a-entity>

    <a-entity id="tunnel" gltf-model="#model-tunnel" follow-camera></a-entity>

    <a-entity gltf-model="#model-n1k" material="shader: toon; baseColor: #ff8080" position="0 1 -2"></a-entity>
    <a-entity gltf-model="#model-dragon" material="shader: toon; baseColor: #ccccff" position="0 1 -2.8" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000"></a-entity>
    <a-entity gltf-model="#model-prof" material="shader: toon; baseColor: #ffff99" position="-1.5 1 -3"></a-entity>
    <a-entity gltf-model="#model-dewey" material="shader: toon; baseColor: #99ff99" position="1.5 1 -3"></a-entity>
    <a-entity gltf-model="#model-bloom" material="shader: toon; baseColor: #ff99ff" position="0 1.5 -3.5"></a-entity>

    <a-sky color="#111"></a-sky>
  </a-scene>
</body>
</html>
