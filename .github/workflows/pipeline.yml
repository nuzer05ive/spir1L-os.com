name: CI / CD
on:
  push:
    branches: [core]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - run: pnpm install --frozen-lockfile
      - run: pnpm hv221:run
      - run: pnpm pxk:simulate --peak 1.2 --duration 10
      - run: pnpm wc:build packages/example.rii --out build/example.riic
      - run: pnpm spiral:e2e --scenario ci

      # ── Build deploy folder ───────────────────────────────────────────
      - name: Compile .rii → .riic for deploy
        run: |
          mkdir -p .gate/dist
          cat <<EOF > .gate/dist/index.html
<!doctype html>
<html><head><meta charset="utf-8"><title>Spir1L-OS Portal</title></head><body><h1>Spir1L-OS – Portal Binaries</h1><p>Build: </p></body></html>
EOF
          shopt -s globstar
          for f in $(ls **/*.rii); do
            base=$(basename "$f" .rii)
            node scripts/build-toolchain.js "$f" ".gate/dist/$base.riic"
          done

      # ── Deploy to Netlify ─────────────────────────────────────────────
      - name: Deploy to Netlify (prod)
        if: success()
        run: npx netlify deploy --prod --dir=.gate/dist --site=$NETLIFY_SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
