name: CI / CD
on:
  push:
    branches: [core]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm hv221:run
      - run: pnpm pxk:simulate --peak 1.2 --duration 10
      - run: pnpm wc:build packages/example.rii --out build/example.riic
      - run: pnpm spiral:e2e --scenario ci
      - name: Deploy to Netlify (green)
        if: success()
        run: pnpm tiime deploy --phase bloom --site green
