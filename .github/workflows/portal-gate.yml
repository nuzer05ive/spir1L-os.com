name: Portal-Gate

on:
  pull_request:
    branches: [core]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      # ── Compile every .rii ─────────────────────────────────────────────
      - name: Compile all .rii ➜ .riic
        run: |
          mkdir -p .gate/dist
          shopt -s globstar
          for f in **/*.rii; do
            base=$(basename "$f" .rii)
            node scripts/build-toolchain.js "$f" ".gate/dist/$base.riic"
          done

      # ── Size gate (≤256 B each) ───────────────────────────────────────
      - name: UX Size Gate
        run: node scripts/ux-report.js .gate/dist 256

      # ── Upload binaries as artifact ───────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: portal-binaries
          path: .gate/dist/*

      # ── Deploy to Netlify (production) ────────────────────────────────
      - name: Deploy to Netlify (prod)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npx netlify deploy \
            --prod \
            --dir=.gate/dist \
            --site=$NETLIFY_SITE_ID \
            --message="CI deploy ${GITHUB_SHA::7}"

  comment:
    needs: gate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portal-binaries
          path: .gate/dist

      - run: node scripts/ux-report.js .gate/dist 256 --md > comment.md

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md','utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
